<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Comparison Demo v3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    padding: 20px;
  }
  h1 {
    text-align: center;
    margin-bottom: 10px;
    font-size: 1.8rem;
    color: #fff;
  }
  .sample-section { margin-bottom: 50px; }
  .sample-title {
    font-size: 1.3rem;
    color: #4a9eff;
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid #333;
  }
  .video-row {
    margin-bottom: 30px;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid #2a2a2a;
  }
  .prompt-text {
    font-size: 0.9rem;
    line-height: 1.5;
    color: #b0b0b0;
    margin-bottom: 14px;
    padding: 12px 16px;
    background: #111;
    border-radius: 8px;
    border-left: 3px solid #4a9eff;
    max-height: 80px;
    overflow-y: auto;
  }
  .prompt-label {
    font-weight: 600;
    color: #4a9eff;
    margin-right: 6px;
  }
  .video-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .video-cell { position: relative; }
  .video-cell video {
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
    display: block;
    background: #000;
  }
  .video-label {
    text-align: center;
    font-size: 0.8rem;
    font-weight: 600;
    color: #888;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .play-hint {
    text-align: center;
    color: #555;
    font-size: 0.8rem;
    margin-top: 8px;
    font-style: italic;
  }
  .play-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 50px;
    height: 50px;
    background: rgba(0,0,0,0.6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .play-overlay::after {
    content: '';
    display: block;
    width: 0; height: 0;
    border-style: solid;
    border-width: 10px 0 10px 18px;
    border-color: transparent transparent transparent #fff;
    margin-left: 3px;
  }
  .play-overlay.hidden { opacity: 0; }
  .row-index {
    font-size: 0.75rem;
    color: #555;
    margin-bottom: 6px;
  }
  nav {
    text-align: center;
    margin-bottom: 30px;
  }
  nav a {
    color: #4a9eff;
    text-decoration: none;
    margin: 0 10px;
    font-size: 0.95rem;
  }
  nav a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>Video Generation Comparison v3</h1>
<nav>
  <a href="#batch5_sample_001">Sample 001</a>
  <a href="#batch5_sample_002">Sample 002</a>
  <a href="#batch5_sample_003">Sample 003</a>
  <a href="#batch5_sample_004">Sample 004</a>
  <a href="#batch5_sample_005">Sample 005</a>
</nav>

<div id="container"></div>

<script>
const MODELS = ['ori', 'lora_dpov28', 'lora_dpov29'];
const MODEL_LABELS = ['Original', 'LoRA DPO v28', 'LoRA DPO v29'];
const VIDEO_IDS = ['000', '001', '002', '003', '004'];

const PROMPTS = {
  'batch5_sample_001': [
    "A half-body insectoid android featuring glowing eyes and a sapphire tiara stands within a digital metaverse. A whirlwind of translucent souls rushes around the figure amidst a vibrant cyberpunk fantasy landscape. The artwork is an intricate digital painting with elegant details and vivid, luminous colors, capturing a sense of dynamic motion through the swirling ethereal energy.",
    "Ariana Grande is dressed in a cottagecore Halloween costume inside a warm, rustic cottage. This intricate digital illustration features Art Nouveau elements with flowing organic lines and ornate details under soft, amber lighting. The scene is brought to life by the flickering of candles and the subtle movement of her dress.",
    "A stunning meditation goddess with a symmetrical face and flowing hair falls gracefully through a vibrant sunset sky in zero gravity. The scene is an ethereal fantasy illustration featuring intricate details and soft volumetric lighting with a warm golden palette. Her hair and garments billow gently in the wind as she drifts through the atmospheric clouds.",
    "A stylish zombie skater wearing oversized hip-hop streetwear stands in a neon-lit urban skate park. The artwork features a vibrant digital illustration style with sharp lines, bold colors, and a polished graffiti-inspired aesthetic. The camera slowly orbits the figure as the loose fabric of the clothing ripples slightly in the air.",
    "A terrifying alien hybrid combining the sleek exoskeleton of a Xenomorph with the aggressive form of a Tyranid Ripper. The creature is nestled within a dark biomechanical hive illuminated by eerie organic glows. This sci-fi concept art features dramatic shadows and captures the creature's subtle, menacing movement through twitching limbs and chittering mandibles."
  ],
  'batch5_sample_002': [
    "A panoramic view of the New York City skyline reimagined as an intricate medieval fantasy city, featuring stone fortresses and soaring towers along the Upper Bay. The setting is captured in a cinematic digital art style with atmospheric lighting and rich textures. The camera slowly pushes in over the rippling water as soft mist drifts between the medieval docks.",
    "Ares offers a bouquet of flowers to a confused Hades while a jealous Aphrodite watches from the background of a dark mythical underworld. The piece is rendered in a detailed ink painting style with textured washes and sharp brushwork. Soft movements are visible in the drifting petals and the gentle swaying of their flowing garments.",
    "A polished digital illustration of a cute Japanese girl with short hair, wearing a blood-stained hoodie and bandages on her legs, featuring a dramatic sadistic smile. The character is centered against a dark, moody background with high-contrast cinematic lighting. Subtle movement is seen in the gentle swaying of her hair and the drawstrings of her hoodie.",
    "A cinematic oil and gouache portrait shows a chubbier man with short hair and a goatee from the chest up. The scene uses a desaturated color palette and dramatic volumetric lighting to highlight the subject's features against a moody, atmospheric background. A slow play of light and shadow across the canvas emphasizes the intricate textures and fine brushwork.",
    "A young girl dressed in a black military crusader maid outfit stands before a detailed steampunk city, her long blonde hair flowing softly in the breeze. The artwork combines baroque oil painting textures with a polished anime aesthetic, emphasizing moody dynamic lighting and a quiet, stoic gaze. The cinematic scene captures the gentle motion of her hair and attire against a background of soft bokeh and intricate mechanical architecture."
  ],
  'batch5_sample_003': [
    "A low-poly Shiba Inu dog is captured in the iconic bonk meme pose, featuring a stylized geometric character design. The setting is a dark, atmospheric space illuminated by cinematic lighting and dramatic lens flares. The camera slowly orbits the character, highlighting the sharp facets and glowing digital details of the scene.",
    "A detailed full-body portrait of a rugged male barkeep standing in a rustic fantasy tavern. The style is cinematic dark fantasy with a realistic aesthetic, featuring global illumination that creates a soft glowing aura. Warm light flickers across the scene while subtle ambient smoke drifts through the air during a slow camera push-in.",
    "A small lemon creature with textured citrus skin and leafy appendages, rendered as vibrant digital concept art. It is positioned against a neutral studio backdrop with soft lighting that emphasizes its organic forms. The creature exhibits gentle breathing and a subtle swaying of its small leaves.",
    "George Washington appears as a messianic figure within a divine cosmic realm filled with ethereal clouds and intense celestial beams. The composition is rendered in a highly detailed cel-shaded cinematic style, featuring vibrant colors and sharp linework that evokes an epic propaganda poster. Shimmering rays of light flicker as the camera slowly pans, with cosmic particles drifting through the heavenly atmosphere.",
    "A stunning portrait of a black-skinned witch with cat ears wearing an ornate flower dress, featuring a perfectly symmetrical composition. The digital artwork is characterized by smooth textures and vibrant summer vibes under professional studio lighting. A gentle breeze creates natural movement in the fine fabric of the gown and her cat ears."
  ],
  'batch5_sample_004': [
    "A heroic cyclopean warforged warrior clad in ornate yellow armor stands ready for battle, wielding an engraved paladin longsword and a massive shield. The scene is set in a grandiose fantasy environment with dramatic, high-contrast cinematic lighting that highlights the metallic sheen of the armor. This digital illustration features painterly textures and a sense of epic scale, with a slow camera zoom and fine dust particles drifting through the air.",
    "A portrait of an adorable, expressive bunny holding a carrot, set against a rain-slicked cyberpunk city street at night. The visual style combines high-end 3D animated character design with a moody noir atmosphere, highlighted by vibrant neon lighting. The scene features subtle motion such as the bunny's nose twitching and light reflections shifting on its fur.",
    "An anime musician sits in a dark, horror-themed recording studio filled with professional equipment and subtle Mario Brothers-inspired visual cues. The scene is rendered as a digital painting with dramatic cinematic lighting that casts deep shadows and sharp highlights across the musician's face. Gentle flickering from the equipment displays and drifting atmospheric particles create a moody, high-contrast establishing shot.",
    "An elegant woman with refined features stands before a backdrop of towering, rugged coastal cliffs. This polished digital illustration features organic patterns and smooth skin textures, blending classical realism with atmospheric lighting and sharp focus. A gentle breeze ruffles her hair and garments against the dramatic scenery.",
    "A ballerina resembling Imaan Hammam performs in ornate fantasy-style garments, her skin glistening with sweat from an intense performance. The scene is set in an ancient, atmospheric stone hall illuminated by dramatic chiaroscuro lighting. The digital painting features smooth textures and intricate decorative details, with a slow camera orbit capturing her graceful dance movements."
  ],
  'batch5_sample_005': [
    "A detailed digital painting of a young girl with fierce, sharp features and a masculine aura as she drinks from an energy can. The scene is set in an elegant fantasy environment with a matte finish and intricate textures. The lighting is dramatic and focused, highlighting her expression as her hair gently drifts and the camera slowly pushes in.",
    "A symmetrical portrait of Albert Einstein as a Jedi master, wearing intricate futuristic tech wear and Jedi robes. He is positioned within a sleek sci-fi environment illuminated by soft, glowing ambient lights. The style is an elegant digital painting with smooth textures and sharp focus, showcasing epic lighting and a refined composition. The camera slowly zooms in as the lights on his attire subtly flicker.",
    "A beautiful woman wearing a red cap rides a powerful black horse slowly through a dense, misty forest of oak and beech trees. Rays of morning light filter through the thick foliage, creating a cinematic fantasy atmosphere with deep shadows and soft highlights. The scene is captured with a sense of quiet majesty as the horse moves steadily through the fog.",
    "An ethereal woman with pale features kneels at the edge of a pond, pouring water from two containers onto the soil and water. The scene is rendered in a detailed Art Nouveau fantasy style, featuring intricate floral designs and a celestial sky with a large central star and seven smaller stars. A bird perches quietly on a nearby branch while soft light illuminates the lush surroundings and gentle ripples disturb the water surface.",
    "A mad scientist with wild hair and goggles laughs joyfully in his suburban backyard as juicy hamburgers fall from the sky. The scene is depicted in a vibrant 3D concept art style with polished surfaces and expressive character design. The falling burgers tumble through the air while a light wind causes the scientist's lab coat to flutter."
  ]
};

const SAMPLES = ['batch5_sample_001', 'batch5_sample_002', 'batch5_sample_003', 'batch5_sample_004', 'batch5_sample_005'];
const container = document.getElementById('container');

SAMPLES.forEach(sample => {
  const section = document.createElement('div');
  section.className = 'sample-section';
  section.id = sample;

  const title = document.createElement('h2');
  title.className = 'sample-title';
  title.textContent = sample.replace('batch5_', 'Batch 5 / ');
  section.appendChild(title);

  VIDEO_IDS.forEach((vid, idx) => {
    const row = document.createElement('div');
    row.className = 'video-row';

    row.innerHTML = `
      <div class="row-index">#${idx + 1} &mdash; ${sample}/${vid}.mp4</div>
      <div class="prompt-text"><span class="prompt-label">Prompt:</span>${PROMPTS[sample][idx]}</div>
      <div class="video-grid">
        ${MODELS.map((model, mi) => `
          <div class="video-cell">
            <div class="video-label">${MODEL_LABELS[mi]}</div>
            <video preload="auto" muted playsinline>
              <source src="videos/${model}/${sample}/${vid}.mp4" type="video/mp4">
            </video>
            <div class="play-overlay"></div>
          </div>
        `).join('')}
      </div>
      <div class="play-hint">Click any video to play/pause all in sync</div>
    `;

    section.appendChild(row);

    const grid = row.querySelector('.video-grid');
    const videos = grid.querySelectorAll('video');
    const overlays = grid.querySelectorAll('.play-overlay');

    grid.addEventListener('click', () => {
      const allPaused = Array.from(videos).every(v => v.paused);
      if (allPaused) {
        videos.forEach(v => { v.currentTime = 0; });
        videos.forEach(v => v.play());
        overlays.forEach(o => o.classList.add('hidden'));
      } else {
        videos.forEach(v => v.pause());
        overlays.forEach(o => o.classList.remove('hidden'));
      }
    });

    videos.forEach(v => {
      v.addEventListener('ended', () => {
        overlays.forEach(o => o.classList.remove('hidden'));
      });
    });
  });

  container.appendChild(section);
});
</script>

</body>
</html>
