const SAMPLES = ['batch5_sample_001', 'batch5_sample_002', 'batch5_sample_003', 'batch5_sample_004', 'batch5_sample_005'];
const container = document.getElementById('container');

SAMPLES.forEach(sample => {
  const section = document.createElement('div');
  section.className = 'sample-section';
  section.id = sample;

  const title = document.createElement('h2');
  title.className = 'sample-title';
  title.textContent = sample.replace('batch5_', 'Batch 5 / ');
  section.appendChild(title);

  VIDEO_IDS.forEach((vid, idx) => {
    const row = document.createElement('div');
    row.className = 'video-row';

    row.innerHTML = `
      <div class="row-index">#${idx + 1} &mdash; ${sample}/${vid}.mp4</div>
      <div class="prompt-text"><span class="prompt-label">Prompt:</span>${PROMPTS[sample][idx]}</div>
      <div class="video-grid">
        ${MODELS.map((model, mi) => `
          <div class="video-cell">
            <div class="video-label">${MODEL_LABELS[mi]}</div>
            <video preload="auto" muted playsinline>
              <source src="videos/${model}/${sample}/${vid}.mp4" type="video/mp4">
            </video>
            <div class="play-overlay"></div>
          </div>
        `).join('')}
      </div>
      <div class="play-hint">Click any video to play/pause all in sync</div>
    `;

    section.appendChild(row);

    const grid = row.querySelector('.video-grid');
    const videos = grid.querySelectorAll('video');
    const overlays = grid.querySelectorAll('.play-overlay');

    grid.addEventListener('click', () => {
      const allPaused = Array.from(videos).every(v => v.paused);
      if (allPaused) {
        videos.forEach(v => { v.currentTime = 0; });
        videos.forEach(v => v.play());
        overlays.forEach(o => o.classList.add('hidden'));
      } else {
        videos.forEach(v => v.pause());
        overlays.forEach(o => o.classList.remove('hidden'));
      }
    });

    videos.forEach(v => {
      v.addEventListener('ended', () => {
        overlays.forEach(o => o.classList.remove('hidden'));
      });
    });
  });

  container.appendChild(section);
});
</script>
